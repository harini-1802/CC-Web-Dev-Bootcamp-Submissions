<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TO-DO LIST</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>TaskList</h1>
        <p>A simple tool to help note daily tasks.</p>
    </header>

    <main>
        <section class="input-section">
            <input type="text" id="taskInput" placeholder="Enter a new task">
            <button id="addButton">Add Task</button>
        </section>

        <section class="list-section">
            <ul id="taskList"></ul>
        </section>
    </main>

    <section class="profile-card">
        <img src="pic1.jpg" alt="TO-DO LIST" width="200" height="200">
        <img src="pic2.jpeg" alt="TO-DO LIST" width="200" height="200">
        <h3>Do Or Die!</h3>
        <p>I am your soon-to-be best friend, ready to help you finish your tasks on time, every day. Be ready to do or die!</p>
        <p>Created by - Harini - (A second sem rookie eager to learn!)</p>
    </section>

    <script src="script.js"></script>
</body>
</html>
